spring:
  application:
    name: isb-ifsb-regulatory-reporting

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "IFSB Regulatory Reporting"
    businessArea: "Takaful and Shared Operations"
    businessDomain: "Shared Operations"
    functionalPattern: "Process"
    assetType: "IFSB Regulatory Report"
    controlRecord: "IFSB Regulatory Report Procedure"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
